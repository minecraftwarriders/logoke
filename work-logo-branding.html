<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo & Branding — logoke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <nav id="nav">
    <a href="index.html" class="nav-logo">logoke</a>
    <div class="nav-links" id="navLinks">
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Open menu">
      <span></span>
      <span></span>
    </button>
  </nav>

  <div class="page-header">
    <div class="breadcrumb">
      <a href="index.html">Work</a>
      <span>/</span>
      <span>Logo & Branding</span>
    </div>
    <span class="page-label">Discipline 02</span>
    <h1 class="page-title">Logo &<br>Branding</h1>
  </div>

  <div class="work-grid">

    <div class="work-card">
      <div class="work-card-img"><div class="placeholder-dot"></div></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2025</div>
      </div>
    </div>

    <div class="work-card">
      <div class="work-card-img"><div class="placeholder-dot"></div></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2025</div>
      </div>
    </div>

    <div class="work-card">
      <div class="work-card-img"><div class="placeholder-dot"></div></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2024</div>
      </div>
    </div>

    <div class="work-card">
      <div class="work-card-img"><div class="placeholder-dot"></div></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2024</div>
      </div>
    </div>

    <div class="work-card">
      <div class="work-card-img"><div class="placeholder-dot"></div></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2024</div>
      </div>
    </div>

    <div class="work-card">
      <div class="work-card-img"><div class="placeholder-dot"></div></div>
      <div class="work-card-info">
        <div class="work-card-title">Project Title</div>
        <div class="work-card-meta">2024</div>
      </div>
    </div>

  </div>

  <footer>
    <a href="index.html" class="footer-logo">logoke</a>
    <span class="footer-copy">© 2025</span>
  </footer>

  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      const open = links.classList.toggle('open');
      toggle.classList.toggle('open', open);
      toggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
    });

    const cards = document.querySelectorAll('.work-card');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05, rootMargin: '0px 0px -30px 0px' });

    cards.forEach((card, i) => {
      card.style.transitionDelay = `${i * 65}ms`;
      observer.observe(card);
    });
  </script>
</body>
</html>
